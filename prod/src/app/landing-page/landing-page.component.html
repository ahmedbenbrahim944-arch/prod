<div class="page-container">

  <div class="main-wrapper">

    <!-- Corps -->
    <div class="note-body">

      <!-- Images côte à côte -->
      <div class="images-row">
        <div class="image-card">
          <img src="assets/images/verain1.jpg" alt="Vérin de sécurité 1" />
        </div>
        <div class="image-card">
          <img src="assets/images/verain2.png" alt="Vérin de sécurité 2" />
        </div>
      </div>

      <!-- Message d'avertissement -->
      <div class="warning-box">
        <span class="warning-icon">⚠️</span>
        <span class="warning-text">
          تحذير — لا تلمس القطعة إلا بعد التأكد من أن vérin de sécurité (الدائرة الحمراء في الصورة) موجودا
        </span>
      </div>

    </div>

    <!-- Footer -->
    <div class="footer-note">
      <span class="footer-text">Ressources Humaines · الموارد البشرية</span>
      <span class="footer-sep">—</span>
      <span class="footer-sub">Seraf Tunisie</span>
      <span class="footer-sig">Directeur Général</span>
    </div>

  </div>

  <!-- Progress bar -->
  <div class="progress-track">
    <div class="progress-fill"
         [style.transition]="progressTransition"
         [style.width]="progressWidth">
    </div>
  </div>

</div>
