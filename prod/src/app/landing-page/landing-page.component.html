<div class="page-container">

  <div class="main-wrapper">

    <!-- Corps -->
    <div class="note-body">

      <!-- Logo Schneider -->
      <div class="logo-wrapper">
        <img src="assets/images/shc.jpg" alt="Schneider Electric" class="brand-logo" />
      </div>

      <!-- Message Bienvenue -->
      <div class="welcome-block">
        <div class="welcome-text">Bienvenue</div>
        <div class="brand-name">Schneider Electric</div>
      </div>

    </div>

  </div>

  <!-- Progress bar -->
  <div class="progress-track">
    <div class="progress-fill"
         [style.transition]="progressTransition"
         [style.width]="progressWidth">
    </div>
  </div>

</div>
