<div style="position:relative" class="pointage-wrapper">

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-time">{{ currentTime }}</div>
    <div class="status-date">{{ currentDate }}</div>
    <div class="status-online">
      <span class="status-dot"></span>
      SYSTÈME EN LIGNE
    </div>
  </div>

  <!-- Main Layout -->
  <div class="main-layout">

    <!-- LEFT PANEL -->
    <div class="left-panel">

      <!-- RFID Zone -->
      <div class="rfid-zone"
           [class.rfid-active]="rfidScanning"
           [class.rfid-ok]="rfidSuccess"
           (click)="onRfidClick()">
        <svg width="56" height="56" viewBox="0 0 64 64" fill="none" class="rfid-svg">
          <rect x="6" y="14" width="52" height="36" rx="5" stroke="currentColor" stroke-width="3"/>
          <rect x="12" y="20" width="18" height="14" rx="3" stroke="currentColor" stroke-width="2.5"/>
          <line x1="36" y1="23" x2="52" y2="23" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="36" y1="32" x2="52" y2="32" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="36" y1="39" x2="46" y2="39" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <div class="rfid-label">{{ rfidLabel }}</div>
        <div class="rfid-hint">Approcher votre badge RFID</div>
      </div>

      <!-- Divider -->
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">OU</span>
        <span class="divider-line"></span>
      </div>

      <!-- Matricule Display -->
      <div class="matricule-section">
        <label class="mat-label">SAISIE MANUELLE — MATRICULE</label>
        <div class="mat-display"
             [class.mat-has-value]="matricule.length > 0"
             [class.mat-error]="hasError">
          <div class="digits-row">
            <div *ngFor="let digit of displayDigits; let i = index"
                 class="digit-box"
                 [class.digit-filled]="digit !== ''"
                 [class.digit-cursor]="i === matricule.length">
              {{ digit }}
            </div>
          </div>
        </div>
        <div *ngIf="hasError" class="error-msg">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"/>
          </svg>
          {{ errorMessage }}
        </div>
      </div>

    </div>

    <!-- RIGHT PANEL — Numpad -->
    <div class="right-panel">
      <div class="numpad-wrapper">
        <div class="numpad-grid">
          <button *ngFor="let btn of numpadButtons"
                  class="nkey"
                  [class.nkey-num]="btn.type === 'number'"
                  [class.nkey-del]="btn.type === 'delete'"
                  [class.nkey-ok]="btn.type === 'confirm'"
                  [disabled]="isLoading"
                  (click)="onKeyPress(btn)">
            <span *ngIf="btn.type === 'number'">{{ btn.value }}</span>
            <svg *ngIf="btn.type === 'delete'" width="26" height="26" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/>
              <line x1="18" y1="9" x2="12" y2="15"/>
              <line x1="12" y1="9" x2="18" y2="15"/>
            </svg>
            <!-- Confirm : spinner si loading, sinon checkmark -->
            <ng-container *ngIf="btn.type === 'confirm'">
              <svg *ngIf="!isLoading" width="26" height="26" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="3">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              <svg *ngIf="isLoading" width="26" height="26" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2.5"
                   class="spin">
                <circle cx="12" cy="12" r="10" stroke-opacity="0.3"/>
                <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/>
              </svg>
            </ng-container>
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- Feedback Overlay -->
  <div *ngIf="showFeedback" class="feedback-overlay">
    <div class="feedback-card"
         [class.fb-success]="feedbackType === 'success'"
         [class.fb-error]="feedbackType === 'error'">

      <!-- Icône -->
      <div class="fb-icon"
           [class.fb-icon-success]="feedbackType === 'success'"
           [class.fb-icon-error]="feedbackType === 'error'">
        <svg *ngIf="feedbackType === 'success'" width="40" height="40" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="3">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <svg *ngIf="feedbackType === 'error'" width="40" height="40" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="3">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </div>

      <!-- Nom ouvrier -->
      <div class="fb-name">{{ feedbackName }}</div>

      <!-- Ligne de production (uniquement en succès) -->
      <div *ngIf="feedbackType === 'success' && feedbackLigne" class="fb-ligne">
        {{ feedbackLigne }}
      </div>

      <!-- Message -->
      <div class="fb-msg"
           [class.fb-msg-success]="feedbackType === 'success'"
           [class.fb-msg-error]="feedbackType === 'error'">
        {{ feedbackMessage }}
      </div>

      <!-- Heure -->
      <div class="fb-time">{{ feedbackTime }}</div>
    </div>
  </div>

</div>
